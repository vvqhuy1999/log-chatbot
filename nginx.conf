events {
    worker_connections 1024; # Số kết nối đồng thời tối đa cho mỗi worker
}

http {
    include       /etc/nginx/mime.types; # Ánh xạ phần mở rộng tệp -> MIME type
    default_type  application/octet-stream; # MIME mặc định nếu không xác định

    # Ghi log
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" ' # Định nghĩa định dạng log tên "main"
                      '$status $body_bytes_sent "$http_referer" '             # Thêm trạng thái, số byte, referrer
                      '"$http_user_agent" "$http_x_forwarded_for"';           # Thêm User-Agent và X-Forwarded-For

    access_log  /var/log/nginx/access.log  main; # Ghi access log theo định dạng "main"

    # Thiết lập cơ bản
    sendfile        on; # Dùng sendfile() để truyền tệp hiệu quả
    tcp_nopush      on; # Tối ưu gửi gói bằng cách gom/buffer
    tcp_nodelay     on; # Tắt Nagle để giảm độ trễ
    keepalive_timeout  65; # Giữ kết nối để tái sử dụng
    types_hash_max_size 2048; # Tăng kích thước bảng băm MIME types

    # Cấu hình Gzip
    gzip on; # Bật nén gzip
    gzip_vary on; # Thêm header Vary: Accept-Encoding
    gzip_min_length 1024; # Chỉ nén phản hồi lớn hơn 1KB
    gzip_proxied any; # Cho phép nén với request đi qua proxy
    gzip_comp_level 6; # Mức nén (1-9), 6 là cân bằng giữa hiệu năng/kích thước
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml; # Nén các loại nội dung này

    server {
        listen 80; # Cổng HTTP
        server_name localhost; # Tên server

        # Thư mục gốc
        root /usr/share/nginx/html; # Phục vụ frontend đã build tại đây
        index index.html; # Tệp index mặc định

        # Hỗ trợ routing phía client (SPA)
        location / {
            try_files $uri $uri/ /index.html; # Fallback về index.html cho các route không tồn tại
        }

        # Proxy API tới backend trong cùng mạng Docker
        location /api/ {
            proxy_pass http://app:8080;  # Chuyển tiếp API tới container backend "app" cổng 8080
            proxy_http_version 1.1; # Dùng HTTP/1.1 khi proxy
            proxy_set_header Host $host; # Giữ nguyên header Host
            proxy_set_header X-Real-IP $remote_addr; # IP thật của client
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # Chuỗi IP qua các proxy
            proxy_set_header X-Forwarded-Proto $scheme; # Giao thức gốc (http/https)
        }

        # Cache tài nguyên tĩnh
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y; # Cache 1 năm
            add_header Cache-Control "public, immutable"; # Nội dung không thay đổi
        }

        # Header bảo mật
        add_header X-Frame-Options "SAMEORIGIN" always; # Chống clickjacking
        add_header X-XSS-Protection "1; mode=block" always; # Bảo vệ XSS cơ bản
        add_header X-Content-Type-Options "nosniff" always; # Vô hiệu hoá sniff MIME
        add_header Referrer-Policy "no-referrer-when-downgrade" always; # Chính sách referrer
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'" always; # CSP cơ bản

        # Ghi chú: proxy /api giúp trình duyệt coi là cùng nguồn (same-origin)
    }
}
